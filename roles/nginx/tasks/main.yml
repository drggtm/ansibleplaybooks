---
- name: Install nginx
  apt:
    name: nginx
    state: latest
    update_cache: yes

- name: Ensure nginx is enabled and running
  service:
    name: nginx
    enabled: yes
    state: started

- name: Deploy the default index page
  ansible.builtin.template:
    src: index.html.j2
    dest: /var/www/html/index.nginx-debian.html
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload nginx
